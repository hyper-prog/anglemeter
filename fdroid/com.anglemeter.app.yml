Summary: AngleMeter is an Android app for real-time angle and alignment measuring tool with camera picture.
Description: |
  AngleMeter is an Android app that allows users to measure angles and alignments in real-time using the device's camera. It provides a simple and intuitive interface for capturing and analyzing angles, making it a useful tool for various applications such as construction, DIY projects.

  The app helps you level and align the device by combining sensor-based angle visualization with an optional live camera overlay.

